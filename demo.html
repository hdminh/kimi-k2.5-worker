<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kimi K2.5 Chat Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 800px;
      height: 600px;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 20px;
      border-bottom: 1px solid #e0e0e0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 20px 20px 0 0;
    }
    .header h1 { font-size: 24px; margin-bottom: 5px; }
    .header p { font-size: 14px; opacity: 0.9; }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .message {
      display: flex;
      gap: 10px;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.user { justify-content: flex-end; }
    .message-content {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 18px;
      word-wrap: break-word;
    }
    .message.user .message-content {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .message.assistant .message-content {
      background: #f0f0f0;
      color: #333;
    }
    .input-area {
      padding: 20px;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 10px;
    }
    input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 25px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.3s;
    }
    input:focus { border-color: #667eea; }
    button {
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: transform 0.2s;
    }
    button:hover { transform: scale(1.05); }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .typing {
      display: flex;
      gap: 5px;
      padding: 12px 16px;
    }
    .typing span {
      width: 8px;
      height: 8px;
      background: #999;
      border-radius: 50%;
      animation: typing 1.4s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-10px); }
    }
    .config {
      padding: 10px 20px;
      background: #f9f9f9;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      gap: 15px;
      align-items: center;
      font-size: 13px;
    }
    .config label { display: flex; align-items: center; gap: 5px; }
    .config input[type="checkbox"] { cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🤖 Kimi K2.5 Chat</h1>
      <p>Powered by Cloudflare Workers AI</p>
    </div>
    
    <div class="config">
      <label>
        <input type="checkbox" id="streamToggle" checked>
        Streaming
      </label>
      <label>
        Temperature:
        <input type="range" id="tempSlider" min="0" max="2" step="0.1" value="0.7" style="width: 100px;">
        <span id="tempValue">0.7</span>
      </label>
    </div>
    
    <div class="messages" id="messages">
      <div class="message assistant">
        <div class="message-content">
          Xin chào! Tôi là Kimi K2.5, một AI model với 256k context window. Tôi có thể giúp gì cho bạn?
        </div>
      </div>
    </div>
    
    <div class="input-area">
      <input type="text" id="input" placeholder="Nhập tin nhắn..." />
      <button id="send">Gửi</button>
    </div>
  </div>

  <script>
    const WORKER_URL = 'YOUR_WORKER_URL_HERE'; // Thay bằng URL worker của bạn
    
    const messagesDiv = document.getElementById('messages');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const streamToggle = document.getElementById('streamToggle');
    const tempSlider = document.getElementById('tempSlider');
    const tempValue = document.getElementById('tempValue');
    
    let messages = [];
    
    tempSlider.addEventListener('input', (e) => {
      tempValue.textContent = e.target.value;
    });
    
    function addMessage(role, content) {
      messages.push({ role, content });
      
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${role}`;
      messageDiv.innerHTML = `<div class="message-content">${content}</div>`;
      messagesDiv.appendChild(messageDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    function showTyping() {
      const typingDiv = document.createElement('div');
      typingDiv.className = 'message assistant';
      typingDiv.id = 'typing';
      typingDiv.innerHTML = `
        <div class="message-content typing">
          <span></span><span></span><span></span>
        </div>
      `;
      messagesDiv.appendChild(typingDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    function hideTyping() {
      const typing = document.getElementById('typing');
      if (typing) typing.remove();
    }
    
    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      
      addMessage('user', text);
      input.value = '';
      sendBtn.disabled = true;
      
      const stream = streamToggle.checked;
      const temperature = parseFloat(tempSlider.value);
      
      try {
        if (stream) {
          showTyping();
          
          const response = await fetch(`${WORKER_URL}/chat`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              messages: [...messages],
              stream: true,
              temperature
            })
          });
          
          hideTyping();
          
          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let fullResponse = '';
          
          const messageDiv = document.createElement('div');
          messageDiv.className = 'message assistant';
          const contentDiv = document.createElement('div');
          contentDiv.className = 'message-content';
          messageDiv.appendChild(contentDiv);
          messagesDiv.appendChild(messageDiv);
          
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            
            const chunk = decoder.decode(value);
            const lines = chunk.split('\n');
            
            for (const line of lines) {
              if (line.startsWith('data: ')) {
                const data = line.slice(6);
                if (data === '[DONE]') continue;
                
                try {
                  const json = JSON.parse(data);
                  const content = json.response || json.choices?.[0]?.delta?.content || '';
                  fullResponse += content;
                  contentDiv.textContent = fullResponse;
                  messagesDiv.scrollTop = messagesDiv.scrollHeight;
                } catch (e) {}
              }
            }
          }
          
          messages.push({ role: 'assistant', content: fullResponse });
          
        } else {
          showTyping();
          
          const response = await fetch(`${WORKER_URL}/chat`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              messages: [...messages],
              stream: false,
              temperature
            })
          });
          
          hideTyping();
          
          const data = await response.json();
          const content = data.response || data.choices?.[0]?.message?.content || 'No response';
          addMessage('assistant', content);
        }
        
      } catch (error) {
        hideTyping();
        addMessage('assistant', `❌ Error: ${error.message}`);
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }
    
    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
    
    input.focus();
  </script>
</body>
</html>
